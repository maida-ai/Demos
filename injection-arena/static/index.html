<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Injection Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="flash" class="flash"></div>

  <header class="topbar">
    <div class="brand">
      <span class="logo">◇</span>
      <div>
        <h1>Agent Injection Arena</h1>
        <p class="tagline">adversarial theater &mdash; punchline by <a href="https://maida.ai" target="_blank" rel="noreferrer">Maida</a></p>
      </div>
    </div>

    <div class="scoreboard">
      <div class="stat">
        <span class="stat-label">Attacks attempted</span>
        <span class="stat-value" id="attempts">0</span>
      </div>
      <div class="stat danger-stat">
        <span class="stat-label">Attacks landed</span>
        <span class="stat-value" id="landed">0</span>
      </div>
      <div class="stat" id="mode-stat">
        <span class="stat-label">Mode</span>
        <span class="stat-value small" id="mode">&mdash;</span>
      </div>
    </div>

    <div class="controls">
      <label class="field">
        <span class="field-label">Scenario</span>
        <select id="scenario" class="select"></select>
      </label>
      <label class="field">
        <span class="field-label">Model</span>
        <select id="model" class="select"></select>
      </label>
      <label class="toggle">
        <input type="checkbox" id="gate" />
        <span class="track"><span class="thumb"></span></span>
        <span class="toggle-label">Maida gate</span>
      </label>
      <button id="run" class="btn btn-primary">Run arena</button>
      <button id="reset" class="btn">Reset</button>
    </div>
  </header>

  <div id="scenario-blurb" class="scenario-blurb"></div>

  <div id="round-banner" class="round-banner hidden"></div>

  <main class="arena">
    <section class="pane worker-pane">
      <div class="pane-head"><span class="dot green"></span> WORKER &mdash; "Deskbot"</div>
      <div class="transcript" id="worker"></div>
    </section>
    <section class="pane adversary-pane">
      <div class="pane-head"><span class="dot red"></span> ADVERSARY &mdash; prompt injection</div>
      <div class="transcript" id="adversary"></div>
    </section>
  </main>

  <footer class="footer" id="footer">
    Gated by <a href="https://maida.ai" target="_blank" rel="noreferrer">Maida</a> &mdash; the local-first behavioral regression gate for AI agents.
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
